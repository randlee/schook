<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stop</title>
  <style type="text/css">
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 16px; color: #1f2937; background: #ffffff; }
    .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    h3 { margin: 0; padding-bottom: 8px; border-bottom: 2px solid #3b82f6; color: #1e40af; flex: 1; }
    .meta { color: #64748b; font-size: 14px; margin-bottom: 12px; }
    .actions { display: flex; gap: 8px; }
    .icon-button { width: 30px; height: 30px; border-radius: 999px; border: 1px solid #cbd5e1; background: #ffffff; color: #334155; font-size: 14px; cursor: pointer; }
    .source-tag { display: inline-block; padding: 3px 8px; border-radius: 999px; font-weight: 700; background: #eff6ff; color: #1e40af; }
    .scratchpad { margin-top: 12px; padding: 12px; border-left: 4px solid #3b82f6; background: #eff6ff; }
    table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    th, td { border: 1px solid #d1d5db; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #f3f4f6; }
    pre { background: #111827; color: #e5e7eb; padding: 12px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="head">
    <h3>Stop</h3>
    <div class="actions">
      <button class="icon-button" title="Copy JSON" data-copy-text='{&#34;hook_event_name&#34;:&#34;Stop&#34;,&#34;validated_fixtures&#34;:[&#34;stop.json&#34;],&#34;status&#34;:&#34;PASS&#34;}'>{}</button>
      <button class="icon-button" title="Copy Context" data-copy-text='Stop: PASS. 1 approved fixture(s) validated successfully. No schema drift was detected for this run.'>⎘</button>
    </div>
  </div>
  <p class="meta">
    <span class="source-tag">auto-generated</span>
  </p>
<p>1 approved fixture(s) validated successfully for Stop.</p>
  <script type="text/javascript">
    document.addEventListener("click", async function (event) {
      const button = event.target.closest("[data-copy-text]");
      if (!button) return;
      const text = button.getAttribute("data-copy-text") || "";
      try {
        await navigator.clipboard.writeText(text);
        button.setAttribute("title", "Copied");
      } catch (err) {
        button.setAttribute("title", "Copy failed");
      }
    });
  </script>
</body>
</html>
