name: CI

on:
  pull_request:
    branches: [develop, main, "integrate/*", "integration/*"]
  push:
    branches: [develop, main, "integration/*"]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone sc-observability (path dependency)
        run: git clone --depth 1 --branch main https://github.com/randlee/sc-observability.git "${{ github.workspace }}/../../sc-observability"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --all

  clippy:
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone sc-observability (path dependency)
        run: git clone --depth 1 --branch main https://github.com/randlee/sc-observability.git "${{ github.workspace }}/../../sc-observability"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-clippy-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ubuntu-clippy-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-clippy-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: rustdoc
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone sc-observability (path dependency)
        run: git clone --depth 1 --branch main https://github.com/randlee/sc-observability.git "${{ github.workspace }}/../../sc-observability"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"

      - name: Check rustdoc warnings
        run: RUSTDOCFLAGS="-Dwarnings -Wmissing-docs" cargo doc --no-deps --workspace

  build:
    name: build (${{ matrix.os }})
    needs: [docs]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone sc-observability (path dependency)
        run: git clone --depth 1 --branch main https://github.com/randlee/sc-observability.git "${{ github.workspace }}/../../sc-observability"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-build-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-build-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-build-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
